name: iamresist intel cron

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "7 * * * *"
  workflow_dispatch: {}

concurrency:
  group: iamresist-intel-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call cron endpoints
        env:
          BASE_URL: ${{ secrets.IAMRESIST_BASE_URL != '' && secrets.IAMRESIST_BASE_URL || 'https://www.iamresist.org' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret" >&2
            exit 1
          fi

          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "[$TS] Running intel ingest..."
          curl -fsS "$BASE_URL/api/cron/ingest-signal" \
            -H "Authorization: Bearer $CRON_SECRET" >/dev/null

          echo "[$TS] Running bounded intel rescore..."
          curl -fsS "$BASE_URL/api/cron/intel-rescore?maxRows=300" \
            -H "Authorization: Bearer $CRON_SECRET" >/dev/null

          echo "[$TS] Revalidating caches..."
          curl -fsS -X POST "$BASE_URL/api/revalidate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --data '{"tags":["homepage-briefing","homepage-intel-feed","voices-feed","voices-homepage-feed","intel-live","intel-sources","newswire","curated-videos","protest-music","unified-archive","journal","bookclub"]}' >/dev/null

          echo "[$TS] Warming homepage and related caches..."
          curl -fsS "$BASE_URL/api/cron/warm-home" \
            -H "Authorization: Bearer $CRON_SECRET" >/dev/null

          echo "[$TS] Keep-alive ping..."
          curl -fsS "$BASE_URL/api/cron/keep-alive" \
            -H "Authorization: Bearer $CRON_SECRET" >/dev/null